# Door and trunk sensors and controls.
# Requires: client-core.yml
#
# Provides:
#   Sensors:  is_unlocked, is_boot_open, is_frunk_open,
#             is_front_driver_door_open, is_front_passenger_door_open,
#             is_rear_driver_door_open, is_rear_passenger_door_open
#             (all from VCSEC — sleep-safe, no infotainment needed)
#   Lock:     lock_car
#   Covers:   cov_front_driver_door, cov_front_passenger_door,
#             cov_rear_driver_door, cov_rear_passenger_door,
#             cov_boot, cov_frunk
#   Buttons:  btn_unlatch_driver_door
#   Note:     charge flap sensor, charge port cover, and unlock charge port
#             button are in client-charging.yml

tesla_ble_vehicle:
  is_unlocked:
    id: "is_unlocked"
    name: "Doors"
  is_boot_open:
    id: "is_boot_open"
    name: "Boot"
  is_frunk_open:
    id: "is_frunk_open"
    name: "Frunk"
  is_front_driver_door_open:
    id: "is_front_driver_door_open"
    name: "Front driver door"
  is_front_passenger_door_open:
    id: "is_front_passenger_door_open"
    name: "Front passenger door"
  is_rear_driver_door_open:
    id: "is_rear_driver_door_open"
    name: "Rear driver door"
  is_rear_passenger_door_open:
    id: "is_rear_passenger_door_open"
    name: "Rear passenger door"

lock:
  - platform: template
    id: lock_car
    name: "Lock car"
    optimistic: true
    icon: mdi:lock
    lambda: |-
      if (id(is_unlocked).state) {
          return LOCK_STATE_UNLOCKED;
        } else {
          return LOCK_STATE_LOCKED;
        }
    unlock_action:
      - lambda: |-
          id(tesla_ble_vehicle_id)->lockVehicle(VCSEC_RKEAction_E_RKE_ACTION_UNLOCK);
    lock_action:
      - lambda: |-
          id(tesla_ble_vehicle_id)->lockVehicle(VCSEC_RKEAction_E_RKE_ACTION_LOCK);

cover:
  - platform: template
    id: cov_front_driver_door
    name: "Front driver door"
    optimistic: true
    device_class: door
    icon: mdi:car-door
    lambda: |-
      if (id(is_front_driver_door_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_frontDriverDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    close_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_frontDriverDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_CLOSE);

  - platform: template
    id: cov_front_passenger_door
    name: "Front passenger door"
    optimistic: true
    device_class: door
    icon: mdi:car-door
    lambda: |-
      if (id(is_front_passenger_door_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_frontPassengerDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    close_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_frontPassengerDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_CLOSE);

  - platform: template
    id: cov_rear_driver_door
    name: "Rear driver door"
    optimistic: true
    device_class: door
    icon: mdi:car-door
    lambda: |-
      if (id(is_rear_driver_door_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_rearDriverDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    close_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_rearDriverDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_CLOSE);

  - platform: template
    id: cov_rear_passenger_door
    name: "Rear passenger door"
    optimistic: true
    device_class: door
    icon: mdi:car-door
    lambda: |-
      if (id(is_rear_passenger_door_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_rearPassengerDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    close_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage(VCSEC_ClosureMoveRequest_rearPassengerDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_CLOSE);

  - platform: template
    id: cov_boot
    name: "Boot"
    optimistic: true
    device_class: door
    icon: mdi:car-back
    lambda: |-
      if (id(is_boot_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage (VCSEC_ClosureMoveRequest_rearTrunk_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    close_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage (VCSEC_ClosureMoveRequest_rearTrunk_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_CLOSE);

  - platform: template
    id: cov_frunk
    name: "Frunk"
    optimistic: true
    device_class: door
    icon: mdi:car
    lambda: |-
      if (id(is_frunk_open).state) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }
    open_action:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage (VCSEC_ClosureMoveRequest_frontTrunk_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);

button:
  - platform: template
    id: btn_unlatch_driver_door
    name: Unlatch driver door
    icon: mdi:car-door
    on_press:
      - lambda: id(tesla_ble_vehicle_id)->sendVCSECClosureMoveRequestMessage (VCSEC_ClosureMoveRequest_frontDriverDoor_tag, VCSEC_ClosureMoveType_E_CLOSURE_MOVE_TYPE_OPEN);
    disabled_by_default: true
